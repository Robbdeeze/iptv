name: check
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get list of changed files
        id: files
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.after }}"
          if [ -z "$BASE" ]; then
            git fetch origin master:master --depth=1 2>/dev/null || true
            BASE="origin/master"
          fi
          CHANGED=$(git diff --diff-filter=ACMRT --name-only "$BASE" -- streams/ 2>/dev/null || echo "")
          echo "all_changed_files=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -n "$CHANGED" ]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        if: steps.files.outputs.any_changed == 'true'
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        if: steps.files.outputs.any_changed == 'true'
        run: npm install
      - name: Validate changed files
        if: steps.files.outputs.any_changed == 'true'
        run: |
          npm run playlist:lint -- ${{ steps.files.outputs.all_changed_files }}
          npm run playlist:validate -- ${{ steps.files.outputs.all_changed_files }}