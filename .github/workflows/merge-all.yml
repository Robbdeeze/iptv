name: Merge All M3U

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts

      - run: npm run playlist:mergeAll

      - name: Generate channels.xml for EPG
        run: npx tsx scripts/commands/playlist/generateEpg.ts Robbdeeze_UltimateTV_AllM3uMerged.m3u --channels-xml channels.xml

      - name: Build EPG with iptv-org/epg
        run: |
          docker run -d --name epg \
            -v $PWD:/epg/public:Z \
            -p 3000:3000 \
            -e MAX_CONNECTIONS=5 \
            -e DAYS=1 \
            ghcr.io/iptv-org/epg:master

          echo "Waiting for EPG generation to complete..."
          for i in $(seq 1 180); do
            sleep 60
            if curl -sI http://localhost:3000/guide.xml 2>/dev/null | head -1 | grep -q "200"; then
              echo "EPG generated successfully in ${i} minutes"
              curl -s -o guide.xml http://localhost:3000/guide.xml
              break
            fi
            echo "Waiting... (${i}/180 minutes)"
          done

          if [ ! -f guide.xml ]; then
            echo "EPG generation did not complete within timeout"
            docker logs epg --tail 50
            docker stop epg
            exit 1
          fi

          docker stop epg

      - name: Process and compress EPG
        run: npx tsx scripts/commands/playlist/generateEpg.ts Robbdeeze_UltimateTV_AllM3uMerged.m3u --process-guide guide.xml --output-name Robbdeeze_UltimateTV_AllM3uMerged_Epg

      - name: Validate links
        run: |
          echo "Validating links in playlist..."
          total=$(grep -c '^http' Robbdeeze_UltimateTV_AllM3uMerged.m3u || true)
          dead=0
          grep '^http' Robbdeeze_UltimateTV_AllM3uMerged.m3u | sort -R | head -100 | while IFS= read -r url; do
            code=$(curl -sL --max-time 8 -o /dev/null -w '%{http_code}' "$url" -H 'User-Agent: Mozilla/5.0' 2>/dev/null)
            if [ "$code" = "000" ]; then
              dead=$((dead+1))
            fi
          done
          echo "Total: $total | Sampled: 100 | Dead in sample: $dead"

      - run: |
          git config user.name "Robbdeeze"
          git config user.email "robbdeeze@gmail.com"
          git add Robbdeeze_UltimateTV_AllM3uMerged.m3u Robbdeeze_UltimateTV_AllM3uMerged_Epg.xml Robbdeeze_UltimateTV_AllM3uMerged_Epg.xml.gz
          git pull --rebase origin master
          git diff --cached --quiet || git commit -m "[Bot] Update Robbdeeze_UltimateTV_AllM3uMerged.m3u and EPG"
          git push
