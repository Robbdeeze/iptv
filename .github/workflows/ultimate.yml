name: Ultimate Playlist Update
on:
  schedule:
    - cron: '0 0 */1 * *' # Every 24 hours (at 00:00 daily)
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Needs write permission to commit and push files back to the repo

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Generate Ultimate Playlist
        run: npm run playlist:ultimate

      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          echo "changes=$(git status --porcelain | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Robbdeeze_UltimateTV.m3u Robbdeeze_UltimateTV_Epg.xml Robbdeeze_UltimateTV_Epg.xml.gz streams/*.m3u
          git commit -m "[Bot] Update Robbdeeze_UltimateTV playlist, EPG, and imported streams"
          git push
