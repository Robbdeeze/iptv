name: Ultimate Playlist Update
on:
  schedule:
    - cron: '0 0 */1 * *' # Every 24 hours (at 00:00 daily)
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Needs write permission to commit and push files back to the repo

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Generate Ultimate Playlist
        run: npm run playlist:ultimate

      - name: Generate channels.xml
        run: npx tsx scripts/commands/playlist/generateEpg.ts --channels-xml channels.xml

      - name: Build EPG with iptv-org/epg
        run: |
          docker run -d --name epg \
            -v $PWD:/epg/public:Z \
            -p 3000:3000 \
            -e MAX_CONNECTIONS=5 \
            -e DAYS=3 \
            ghcr.io/iptv-org/epg:master

          sleep 5
          if ! docker ps --format '{{.Names}}' | grep -q '^epg$'; then
            echo "Docker container failed to start"
            docker logs epg --tail 50 || true
            docker rm epg 2>/dev/null || true
            echo "NO_EPG=true" >> $GITHUB_ENV
            exit 0
          fi

          echo "Waiting for EPG generation to complete..."
          for i in $(seq 1 90); do
            sleep 60
            if curl -sI http://localhost:3000/guide.xml 2>/dev/null | head -1 | grep -q "200"; then
              echo "EPG generated successfully after ${i} minutes"
              curl -s -o guide.xml http://localhost:3000/guide.xml
              break
            fi
            echo "Waiting... (${i}/90)"
          done

          docker stop epg || true

          if [ ! -f guide.xml ]; then
            echo "EPG generation did not complete within timeout, skipping EPG"
            docker logs epg --tail 50 || true
            echo "NO_EPG=true" >> $GITHUB_ENV
          else
            echo "EPG build completed"
          fi

      - name: Process and compress EPG
        if: env.NO_EPG != 'true'
        run: npx tsx scripts/commands/playlist/generateEpg.ts --process-guide guide.xml

      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          echo "changes=$(git status --porcelain | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes != '0'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "[Bot] Update Robbdeeze_UltimateTV playlist and EPG"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: Robbdeeze_UltimateTV.m3u Robbdeeze_UltimateTV_Epg.xml Robbdeeze_UltimateTV_Epg.xml.gz streams/**/*.m3u
          skip_dirty_check: ${{ env.NO_EPG == 'true' }}
